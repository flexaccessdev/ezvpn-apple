# XcodeGen spec for the native iOS + macOS ezvpn app.
#
# Generate the Xcode project with:   xcodegen generate
# Then open Ezvpn.xcodeproj, select your signing Team on all three targets
# (Ezvpn, PacketTunnel, PacketTunnelSysEx), and run on a Mac or a real iOS
# device (a Packet Tunnel Provider cannot run in the iOS Simulator).
#
# The packet-tunnel provider ships two ways from one set of shared sources: an
# app extension on iOS (PacketTunnel) and a system extension on macOS
# (PacketTunnelSysEx, required for Developer ID distribution). See the
# PacketTunnelBase template and those two targets below.
#
# The Rust static library + header come from the local Swift package in
# Packages/Ezvpn — a binary target that downloads the pinned release zip
# (libezvpn.xcframework) by URL+checksum, or a local build for FFI dev. See the
# `packages:` section below and Packages/Ezvpn/Package.swift.
name: Ezvpn

options:
  # $(BUNDLE_ID_PREFIX) comes from Developer.xcconfig (overridable per-developer
  # in Developer.local.xcconfig, like DEVELOPMENT_TEAM). Every target sets its
  # PRODUCT_BUNDLE_IDENTIFIER explicitly below, so this generate-time fallback
  # is only a backstop — kept dynamic so nothing pins the maintainer's prefix.
  bundleIdPrefix: $(BUNDLE_ID_PREFIX)
  deploymentTarget:
    iOS: "17.0"
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  # Local package (Packages/Ezvpn) whose binary target downloads the pinned
  # release zip by URL+checksum (reproducible), or links a local build when
  # EZVPN_LOCAL_XCFRAMEWORK=1 (FFI dev). No vendored copy, no fetch script.
  Ezvpn:
    path: Packages/Ezvpn
  # Pure IP/CIDR primitives (overlap checks, netmask math) shared with the
  # extension. Unit-tested natively on macOS: `swift test` in the package dir,
  # outside the app and extension targets.
  TunnelCore:
    path: Packages/TunnelCore

# Per-developer signing lives in Developer.xcconfig (which #include?s the
# gitignored Developer.local.xcconfig). Copy Developer.local.xcconfig.sample to
# Developer.local.xcconfig and set DEVELOPMENT_TEAM so Xcode/xcodebuild builds
# sign automatically — same pattern as ../flextunnel-ios.
configFiles:
  Debug: Developer.xcconfig
  Release: Developer.xcconfig

settings:
  base:
    # DEVELOPMENT_TEAM comes from Developer.xcconfig (see configFiles above).
    # Not set here: a build setting would override the xcconfig value.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# One explicit shared scheme so Xcode runs the app by default instead of
# auto-creating per-target schemes and possibly picking PacketTunnel (which
# can't run on its own — the extension is launched via the host app).
schemes:
  Ezvpn:
    build:
      targets:
        Ezvpn: all
        EzvpnTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - Ezvpn
      targets:
        - EzvpnTests
    profile:
      config: Release
    archive:
      config: Release

# Shared configuration for the two packet-tunnel targets (iOS app-extension and
# macOS system-extension). They compile the same sources and link the same
# packages; only product type, destination, entitlements, and Info.plist differ
# (set on each target). Keeping the shared bits here means the bundle id and
# keychain group can never drift between the two products.
targetTemplates:
  PacketTunnelBase:
    sources:
      # Exclude both Info.plists from target membership: each target points at
      # the right one via INFOPLIST_FILE, and leaving them in the file list
      # would bundle the other platform's plist as a stray resource.
      - path: Sources/PacketTunnel
        excludes:
          - Info.plist
          - Info-macOS.plist
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID_PREFIX).PacketTunnel
        # Team-prefixed ($(AppIdentifierPrefix) is required for keychain sharing)
        # but otherwise a neutral constant — the group name is not tied to the
        # bundle id, so it is stable across any $(BUNDLE_ID_PREFIX). App and
        # extension must carry the identical value; keep these in sync.
        KEYCHAIN_ACCESS_GROUP: "$(AppIdentifierPrefix)ezvpn.shared"
        "ARCHS[sdk=macosx*]": arm64
        SWIFT_OBJC_BRIDGING_HEADER: Sources/PacketTunnel/Bridging-Header.h
        # No LIBRARY_SEARCH_PATHS/HEADER_SEARCH_PATHS/-lezvpn needed: SPM links
        # the binary target's library and puts its embedded Headers/ dir on the
        # consumer's search path, so the bridging header's `#import "ezvpn.h"`
        # resolves automatically. The Rust lib comes from the package binary
        # target; here we only add its system dependencies.
        OTHER_LDFLAGS:
          - $(inherited)
          - -lresolv
          - -lc++
          - -framework
          - Security
          - -framework
          - SystemConfiguration
        # iroh's macOS network monitor queries Wi-Fi link state through
        # CoreWLAN. Static XCFrameworks do not propagate that framework link
        # requirement to their consumer, so the extension must add it here.
        # Harmless on iOS (never built against the macOS SDK).
        "OTHER_LDFLAGS[sdk=macosx*]":
          - $(inherited)
          - -framework
          - CoreWLAN
        MARKETING_VERSION: "0.0.23"
        CURRENT_PROJECT_VERSION: "2"
    dependencies:
      - sdk: NetworkExtension.framework
      # Static-library XCFramework delivered via the sibling's Swift package
      # binary target (downloads the pinned release zip by URL+checksum).
      - package: Ezvpn
        product: libezvpn
      - package: TunnelCore
        product: TunnelCore

targets:
  Ezvpn:
    type: application
    productName: ezvpn
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/Ezvpn
      - Sources/Shared
    settings:
      base:
        PRODUCT_NAME: ezvpn
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID_PREFIX)
        # Team-prefixed ($(AppIdentifierPrefix) is required for keychain sharing)
        # but otherwise a neutral constant — the group name is not tied to the
        # bundle id, so it is stable across any $(BUNDLE_ID_PREFIX). App and
        # extension must carry the identical value; keep these two in sync.
        KEYCHAIN_ACCESS_GROUP: "$(AppIdentifierPrefix)ezvpn.shared"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/Ezvpn/Ezvpn.entitlements
        # macOS entitlements vary by config: Debug (development signing) grants
        # the base networkextension value, Release (Developer ID) the
        # "-systemextension" variant. See the two Ezvpn.macOS[.debug].entitlements.
        "ARCHS[sdk=macosx*]": arm64
        "LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]": "@executable_path/../Frameworks"
        # Developer ID distribution requires the Hardened Runtime (a
        # notarization prerequisite). macOS only — iOS App Store builds neither
        # use nor accept it.
        "ENABLE_HARDENED_RUNTIME[sdk=macosx*]": YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Ezvpn/Info.plist
        MARKETING_VERSION: "0.0.23"
        CURRENT_PROJECT_VERSION: "2"
      configs:
        Debug:
          "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Sources/Ezvpn/Ezvpn.macOS.debug.entitlements
        Release:
          "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Sources/Ezvpn/Ezvpn.macOS.entitlements
          # Release macOS builds sign manually with Developer ID: automatic
          # signing can only archive with a development identity, whose profile
          # cannot grant the "-systemextension" entitlement above. The named
          # profiles are manually managed (created via the App Store Connect
          # API), so xcodebuild accepts them for manual signing and
          # -allowProvisioningUpdates can download them on a fresh machine.
          # CI is unaffected (it builds with CODE_SIGNING_ALLOWED=NO).
          "CODE_SIGN_STYLE[sdk=macosx*]": Manual
          "CODE_SIGN_IDENTITY[sdk=macosx*]": "Developer ID Application"
          "PROVISIONING_PROFILE_SPECIFIER[sdk=macosx*]": "ezvpn Developer ID app"
    dependencies:
      # The packet-tunnel provider ships as an app extension on iOS (the only
      # option there) and a system extension on macOS (required for Developer ID
      # distribution outside the App Store). Same shared sources, two products;
      # each embeds only on its platform. The macOS sysex lands in
      # Contents/Library/SystemExtensions, where the OS activates it on request.
      - target: PacketTunnel
        embed: true
        destinationFilters: [iOS]
      - target: PacketTunnelSysEx
        embed: true
        destinationFilters: [macOS]
        copy:
          destination: wrapper
          subpath: Contents/Library/SystemExtensions
      # The app now shares the pure profile model + name validation with the
      # extension (TunnelProfile, validateTunnelName). The extension also links
      # this package for the IP/CIDR primitives.
      - package: TunnelCore
        product: TunnelCore

  EzvpnTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - Tests/EzvpnTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID_PREFIX).EzvpnTests
        GENERATE_INFOPLIST_FILE: YES
        "ARCHS[sdk=macosx*]": arm64
        # XcodeGen's automatic host path sees this as one multi-destination
        # target and emits the iOS layout for every SDK. Override only macOS,
        # whose executable lives below Contents/MacOS.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ezvpn.app/ezvpn"
        "TEST_HOST[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/ezvpn.app/Contents/MacOS/ezvpn"
    dependencies:
      # XcodeGen uses this app dependency to configure the correct TEST_HOST
      # path on both iOS and macOS.
      - target: Ezvpn
      - package: TunnelCore
        product: TunnelCore

  # iOS ships the tunnel as an app extension (.appex). No macOS-specific
  # overrides here — the macOS product is PacketTunnelSysEx below.
  PacketTunnel:
    type: app-extension
    supportedDestinations: [iOS]
    templates:
      - PacketTunnelBase
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Sources/PacketTunnel/PacketTunnel.entitlements
        INFOPLIST_FILE: Sources/PacketTunnel/Info.plist

  # macOS ships the identical provider as a system extension (.systemextension),
  # the only packaging Apple allows for a Developer-ID-signed network extension
  # distributed outside the App Store. The app activates it via
  # OSSystemExtensionRequest (see SystemExtensionManager). Its bundle id stays
  # $(BUNDLE_ID_PREFIX).PacketTunnel — identical to the iOS appex and to the id
  # TunnelsManager derives — so the NETunnelProviderProtocol wiring is unchanged.
  PacketTunnelSysEx:
    type: system-extension
    supportedDestinations: [macOS]
    templates:
      - PacketTunnelBase
    # main.swift (the executable entry point a system extension needs, absent
    # from the shared iOS app-extension sources) belongs to this target only.
    sources:
      - Sources/PacketTunnelSysEx
    settings:
      base:
        # sysextd only matches an extension whose bundle is NAMED after its
        # bundle identifier (…/SystemExtensions/<bundle id>.systemextension);
        # any other name fails activation with OSSystemExtensionError code 4
        # "Extension not found in App bundle". Same convention as Apple's
        # network/DriverKit samples. Keep the Swift module name stable and
        # valid (dots aren't) via PRODUCT_MODULE_NAME — Info-macOS.plist derives
        # the provider class name from it.
        PRODUCT_NAME: $(PRODUCT_BUNDLE_IDENTIFIER)
        PRODUCT_MODULE_NAME: PacketTunnelSysEx
        INFOPLIST_FILE: Sources/PacketTunnel/Info-macOS.plist
        # Notarization prerequisite; the containing app enables it too.
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        # Entitlements vary by config like the app target: Debug (development
        # signing) uses the base networkextension value, Release (Developer ID)
        # the "-systemextension" variant, signed manually like the app (see the
        # app target's Release config for why).
        Debug:
          CODE_SIGN_ENTITLEMENTS: Sources/PacketTunnel/PacketTunnel.macOS.debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Sources/PacketTunnel/PacketTunnel.macOS.entitlements
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "ezvpn Developer ID sysex"
