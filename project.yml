# XcodeGen spec for the ezvpn iOS POC.
#
# Generate the Xcode project with:   xcodegen generate
# Then open Ezvpn.xcodeproj, select your signing Team on BOTH targets, and run
# on a *real device* (a Packet Tunnel Provider cannot run in the Simulator).
#
# The Rust static library + header come from the local Swift package in
# Packages/Ezvpn — a binary target that downloads the pinned release zip
# (libezvpn.xcframework) by URL+checksum, or a local build for FFI dev. See the
# `packages:` section below and Packages/Ezvpn/Package.swift.
name: Ezvpn

options:
  bundleIdPrefix: com.example.ezvpn
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  # Local package (Packages/Ezvpn) whose binary target downloads the pinned
  # release zip by URL+checksum (reproducible), or links a local build when
  # EZVPN_LOCAL_XCFRAMEWORK is set (FFI dev). No vendored copy, no fetch script.
  Ezvpn:
    path: Packages/Ezvpn
  # Pure IP/CIDR primitives (overlap checks, netmask math) shared with the
  # extension. Unit-tested natively on macOS: `swift test` in the package dir —
  # the app targets are device-only, so tests can't live in them.
  TunnelCore:
    path: Packages/TunnelCore

# Per-developer signing lives in Developer.xcconfig (which #include?s the
# gitignored Developer.local.xcconfig). Copy Developer.local.xcconfig.sample to
# Developer.local.xcconfig and set DEVELOPMENT_TEAM so Xcode/xcodebuild builds
# sign automatically — same pattern as ../flextunnel-ios.
configFiles:
  Debug: Developer.xcconfig
  Release: Developer.xcconfig

settings:
  base:
    # DEVELOPMENT_TEAM comes from Developer.xcconfig (see configFiles above).
    # Not set here: a build setting would override the xcconfig value.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# One explicit shared scheme so Xcode runs the app by default instead of
# auto-creating per-target schemes and possibly picking PacketTunnel (which
# can't run on its own — the extension is launched via the host app).
schemes:
  EzvpnApp:
    build:
      targets:
        EzvpnApp: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

targets:
  EzvpnApp:
    type: application
    platform: iOS
    sources:
      - Sources/EzvpnApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ezvpn
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/EzvpnApp/EzvpnApp.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: PacketTunnel
        embed: true
      # The app now shares the pure profile model + name validation with the
      # extension (TunnelProfile, validateTunnelName). The extension also links
      # this package for the IP/CIDR primitives.
      - package: TunnelCore
        product: TunnelCore

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - Sources/PacketTunnel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ezvpn.PacketTunnel
        CODE_SIGN_ENTITLEMENTS: Sources/PacketTunnel/PacketTunnel.entitlements
        INFOPLIST_FILE: Sources/PacketTunnel/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/PacketTunnel/Bridging-Header.h
        # No LIBRARY_SEARCH_PATHS/HEADER_SEARCH_PATHS/-lezvpn needed: SPM links
        # the binary target's library and puts its embedded Headers/ dir on the
        # consumer's search path, so the bridging header's `#import "ezvpn.h"`
        # resolves automatically. The Rust lib comes from the package binary
        # target; here we only add its system dependencies.
        OTHER_LDFLAGS:
          - $(inherited)
          - -lresolv
          - -lc++
          - -framework
          - Security
          - -framework
          - SystemConfiguration
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - sdk: NetworkExtension.framework
      # Static-library XCFramework delivered via the sibling's Swift package
      # binary target (downloads the pinned release zip by URL+checksum).
      - package: Ezvpn
        product: libezvpn
      - package: TunnelCore
        product: TunnelCore
