# XcodeGen spec for the native iOS + macOS ezvpn app.
#
# Generate the Xcode project with:   xcodegen generate
# Then open Ezvpn.xcodeproj, select your signing Team on BOTH targets, and run
# on a Mac or a real iOS device (a Packet Tunnel Provider cannot run in the
# iOS Simulator).
#
# The Rust static library + header come from the local Swift package in
# Packages/Ezvpn — a binary target that downloads the pinned release zip
# (libezvpn.xcframework) by URL+checksum, or a local build for FFI dev. See the
# `packages:` section below and Packages/Ezvpn/Package.swift.
name: Ezvpn

options:
  bundleIdPrefix: com.andrewtheguy.ezvpn
  deploymentTarget:
    iOS: "17.0"
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  # Local package (Packages/Ezvpn) whose binary target downloads the pinned
  # release zip by URL+checksum (reproducible), or links a local build when
  # EZVPN_LOCAL_XCFRAMEWORK=1 (FFI dev). No vendored copy, no fetch script.
  Ezvpn:
    path: Packages/Ezvpn
  # Pure IP/CIDR primitives (overlap checks, netmask math) shared with the
  # extension. Unit-tested natively on macOS: `swift test` in the package dir,
  # outside the app and extension targets.
  TunnelCore:
    path: Packages/TunnelCore

# Per-developer signing lives in Developer.xcconfig (which #include?s the
# gitignored Developer.local.xcconfig). Copy Developer.local.xcconfig.sample to
# Developer.local.xcconfig and set DEVELOPMENT_TEAM so Xcode/xcodebuild builds
# sign automatically — same pattern as ../flextunnel-ios.
configFiles:
  Debug: Developer.xcconfig
  Release: Developer.xcconfig

settings:
  base:
    # DEVELOPMENT_TEAM comes from Developer.xcconfig (see configFiles above).
    # Not set here: a build setting would override the xcconfig value.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# One explicit shared scheme so Xcode runs the app by default instead of
# auto-creating per-target schemes and possibly picking PacketTunnel (which
# can't run on its own — the extension is launched via the host app).
schemes:
  Ezvpn:
    build:
      targets:
        Ezvpn: all
        EzvpnTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - Ezvpn
      targets:
        - EzvpnTests
    profile:
      config: Release
    archive:
      config: Release

targets:
  Ezvpn:
    type: application
    productName: ezvpn
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/Ezvpn
    settings:
      base:
        PRODUCT_NAME: ezvpn
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewtheguy.ezvpn
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/Ezvpn/Ezvpn.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Sources/Ezvpn/Ezvpn.macOS.entitlements
        "ARCHS[sdk=macosx*]": arm64
        "LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]": "@executable_path/../Frameworks"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        MARKETING_VERSION: "0.0.20"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: PacketTunnel
        embed: true
      # The app now shares the pure profile model + name validation with the
      # extension (TunnelProfile, validateTunnelName). The extension also links
      # this package for the IP/CIDR primitives.
      - package: TunnelCore
        product: TunnelCore

  EzvpnTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - Tests/EzvpnTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        "ARCHS[sdk=macosx*]": arm64
        # XcodeGen's automatic host path sees this as one multi-destination
        # target and emits the iOS layout for every SDK. Override only macOS,
        # whose executable lives below Contents/MacOS.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ezvpn.app/ezvpn"
        "TEST_HOST[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/ezvpn.app/Contents/MacOS/ezvpn"
    dependencies:
      # XcodeGen uses this app dependency to configure the correct TEST_HOST
      # path on both iOS and macOS.
      - target: Ezvpn
      - package: TunnelCore
        product: TunnelCore

  PacketTunnel:
    type: app-extension
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/PacketTunnel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewtheguy.ezvpn.PacketTunnel
        CODE_SIGN_ENTITLEMENTS: Sources/PacketTunnel/PacketTunnel.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Sources/PacketTunnel/PacketTunnel.macOS.entitlements
        "ARCHS[sdk=macosx*]": arm64
        INFOPLIST_FILE: Sources/PacketTunnel/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/PacketTunnel/Bridging-Header.h
        # No LIBRARY_SEARCH_PATHS/HEADER_SEARCH_PATHS/-lezvpn needed: SPM links
        # the binary target's library and puts its embedded Headers/ dir on the
        # consumer's search path, so the bridging header's `#import "ezvpn.h"`
        # resolves automatically. The Rust lib comes from the package binary
        # target; here we only add its system dependencies.
        OTHER_LDFLAGS:
          - $(inherited)
          - -lresolv
          - -lc++
          - -framework
          - Security
          - -framework
          - SystemConfiguration
        # iroh's macOS network monitor queries Wi-Fi link state through
        # CoreWLAN. Static XCFrameworks do not propagate that framework link
        # requirement to their consumer, so the extension must add it here.
        "OTHER_LDFLAGS[sdk=macosx*]":
          - $(inherited)
          - -framework
          - CoreWLAN
        MARKETING_VERSION: "0.0.20"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - sdk: NetworkExtension.framework
      # Static-library XCFramework delivered via the sibling's Swift package
      # binary target (downloads the pinned release zip by URL+checksum).
      - package: Ezvpn
        product: libezvpn
      - package: TunnelCore
        product: TunnelCore
