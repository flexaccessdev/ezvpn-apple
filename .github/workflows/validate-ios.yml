name: Validate iOS (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (tests)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show build environment
        run: |
          uname -m
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Test TunnelCore
        working-directory: Packages/TunnelCore
        run: swift test

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test app models
        run: |
          xcodebuild test \
            -project Ezvpn.xcodeproj \
            -scheme Ezvpn \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-Tests" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ${{ runner.temp }}/TestResults.xcresult
          if-no-files-found: warn
