name: Release macOS DMG (Manual)

# Builds a Developer-ID-signed, notarized, stapled drag-to-Applications .dmg and
# attaches it to a published GitHub prerelease. Manual only — never runs on
# push/PR, so the signing identity and API key in secrets are never exposed to
# untrusted code.
on:
  workflow_dispatch:

permissions:
  contents: write

# One run at a time. A second dispatch queues instead of running in parallel,
# and cancel-in-progress is false so an in-flight notarization is never killed.
concurrency:
  group: release-macos
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Generate tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          timestamp="$(date -u +'%Y%m%d%H%M%S')"
          short_sha="$(git rev-parse --short=7 "$GITHUB_SHA")"
          # macos- prefix keeps these releases distinct from the iOS workflow's.
          echo "release_tag=macos-${timestamp}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Abort if tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.tag.outputs.release_tag }}" | grep -q .; then
            echo "::error::Tag ${{ steps.tag.outputs.release_tag }} already exists on remote"
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${{ steps.tag.outputs.release_tag }}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
            echo "Deleting stale draft release ${{ steps.tag.outputs.release_tag }}"
            gh release delete "${{ steps.tag.outputs.release_tag }}" --yes
          fi

          gh release create "${{ steps.tag.outputs.release_tag }}" \
            --draft \
            --prerelease \
            --target "${{ github.sha }}" \
            --title "Prerelease macOS ${{ steps.tag.outputs.release_tag }}" \
            --generate-notes

  build-macos:
    needs: setup
    name: Build notarized macOS DMG
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show build environment
        run: |
          uname -m
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Write signing xcconfig
        env:
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
          BUNDLE_ID_PREFIX: ${{ vars.BUNDLE_ID_PREFIX }}
        run: |
          set -euo pipefail
          [[ -n "$DEVELOPMENT_TEAM" ]] || { echo "::error::variable DEVELOPMENT_TEAM is empty"; exit 1; }
          [[ -n "$BUNDLE_ID_PREFIX" ]] || { echo "::error::variable BUNDLE_ID_PREFIX is empty"; exit 1; }
          # Developer.xcconfig #include?s this file; it must exist before
          # xcodegen so the real team + bundle prefix flow into the project
          # (the committed com.example.ezvpn default only builds unsigned).
          cat > Developer.local.xcconfig <<EOF
          DEVELOPMENT_TEAM = $DEVELOPMENT_TEAM
          BUNDLE_ID_PREFIX = $BUNDLE_ID_PREFIX
          EOF

      - name: Import Developer ID signing certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$CERT_P12" | base64 --decode > "$CERT_PATH"
          [[ -s "$CERT_PATH" ]] || {
            echo "::error::DEVELOPER_ID_CERT_P12 decoded to an empty file — is the secret set?"
            exit 1
          }

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -f pkcs12 -k "$KEYCHAIN" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild -T /usr/bin/security
          # Prepend our keychain to the search list, preserving the existing ones.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')

          # Confirm a full signing identity (certificate AND private key) landed
          # before touching its ACL: set-key-partition-list otherwise fails with
          # the cryptic "SecItemCopyMatching: item could not be found". The most
          # common cause is a .p12 exported without its private key.
          if ! security find-identity -v -p codesigning "$KEYCHAIN" | grep -q "Developer ID Application"; then
            echo "::error::no 'Developer ID Application' identity after import — DEVELOPER_ID_CERT_P12 must be a .p12 exported WITH its private key (export the identity from Keychain Access, not just the certificate) and DEVELOPER_ID_CERT_PASSWORD must match its export password"
            security find-identity -v "$KEYCHAIN" || true
            exit 1
          fi

          # Let codesign use the private key without a GUI password prompt.
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

          rm -f "$CERT_PATH"

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keys"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/keys/AuthKey.p8"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build, notarize and package DMG
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Team + bundle prefix are read from Developer.local.xcconfig written
          # above; the API key drives both profile download and notarization.
          scripts/create-archive-macos.sh \
            --key "$RUNNER_TEMP/keys/AuthKey.p8" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID"

      - name: Locate the DMG
        id: dmg
        run: |
          set -euo pipefail
          dmg="$(/bin/ls build/*.dmg | head -1)"
          test -f "$dmg"
          echo "path=$dmg" >> "$GITHUB_OUTPUT"

      - name: Upload notarized DMG
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: ${{ steps.dmg.outputs.path }}
          if-no-files-found: error

      - name: Clean up secrets
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/keys/AuthKey.p8" "$RUNNER_TEMP/developer-id.p12" || true

  publish-release:
    needs: [setup, build-macos]
    if: always() && needs.setup.result == 'success' && needs.build-macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: List release artifacts
        run: ls -la artifacts/

      - name: Upload artifacts to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ needs.setup.outputs.release_tag }}" artifacts/* --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.setup.outputs.release_tag }}" --draft=false
