name: Release macOS DMG (Manual)

# Builds a Developer-ID-signed, notarized, stapled drag-to-Applications .dmg and
# uploads it as a workflow artifact. Manual only — never runs on push/PR, so the
# signing identity and API key in secrets are never exposed to untrusted code.
on:
  workflow_dispatch:

permissions:
  contents: read

# One run at a time. A second dispatch queues instead of running in parallel,
# and cancel-in-progress is false so an in-flight notarization is never killed.
concurrency:
  group: release-macos
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build notarized macOS DMG
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show build environment
        run: |
          uname -m
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Write signing xcconfig
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          BUNDLE_ID_PREFIX: ${{ secrets.BUNDLE_ID_PREFIX }}
        run: |
          set -euo pipefail
          [[ -n "$DEVELOPMENT_TEAM" ]] || { echo "::error::secret DEVELOPMENT_TEAM is empty"; exit 1; }
          [[ -n "$BUNDLE_ID_PREFIX" ]] || { echo "::error::secret BUNDLE_ID_PREFIX is empty"; exit 1; }
          # Developer.xcconfig #include?s this file; it must exist before
          # xcodegen so the real team + bundle prefix flow into the project
          # (the committed com.example.ezvpn default only builds unsigned).
          cat > Developer.local.xcconfig <<EOF
          DEVELOPMENT_TEAM = $DEVELOPMENT_TEAM
          BUNDLE_ID_PREFIX = $BUNDLE_ID_PREFIX
          EOF

      - name: Import Developer ID signing certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -f pkcs12 -k "$KEYCHAIN" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild -T /usr/bin/security
          # Let codesign use the private key without a GUI password prompt.
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Prepend our keychain to the search list, preserving the existing ones.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')

          rm -f "$CERT_PATH"

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keys"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/keys/AuthKey.p8"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build, notarize and package DMG
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Team + bundle prefix are read from Developer.local.xcconfig written
          # above; the API key drives both profile download and notarization.
          scripts/create-archive-macos.sh \
            --key "$RUNNER_TEMP/keys/AuthKey.p8" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID"

      - name: Locate the DMG
        id: dmg
        run: |
          set -euo pipefail
          dmg="$(/bin/ls build/*.dmg | head -1)"
          test -f "$dmg"
          echo "path=$dmg" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$dmg")" >> "$GITHUB_OUTPUT"

      - name: Upload notarized DMG
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.dmg.outputs.name }}
          path: ${{ steps.dmg.outputs.path }}
          if-no-files-found: error

      - name: Clean up secrets
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/keys/AuthKey.p8" "$RUNNER_TEMP/developer-id.p12" || true
