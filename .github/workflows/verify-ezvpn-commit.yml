name: Verify against ezvpn commit

# Build the app + PacketTunnel/system extension against libezvpn built from a
# pinned ezvpn *source commit* (not a released xcframework). ezvpn is checked out
# as a sibling directory and built with build-apple.sh, then linked through the
# existing EZVPN_LOCAL_XCFRAMEWORK local-build path (the committed
# Packages/Ezvpn/local/libezvpn.xcframework symlink -> ../ezvpn/dist/apple).
#
# This exists so a not-yet-released ezvpn change can be validated against this
# app before cutting a release and bumping the pinned artifact with
# scripts/bump-xcframework.sh. The regular validate-*.yml jobs still test the
# pinned release download; this one tests the pinned commit.

on:
  workflow_dispatch:
    inputs:
      ezvpn_ref:
        description: "ezvpn git ref (commit SHA / branch / tag) to build against"
        required: true
        default: "dfa1b5e2916603f88f18bf56d2b8aec2191179f0"
      ezvpn_repo:
        description: "ezvpn repository (owner/name)"
        required: true
        default: "flexaccessdev/ezvpn"

permissions:
  contents: read

jobs:
  verify:
    name: Verify (build against pinned ezvpn commit)
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      # Link the locally built xcframework (../ezvpn/dist/apple) via the committed
      # symlink instead of the pinned release download. Must be set for BOTH
      # `xcodegen generate` and `xcodebuild` — SPM reads it at package-resolution
      # time — so it is scoped to the whole job.
      EZVPN_LOCAL_XCFRAMEWORK: "1"
    steps:
      - name: Check out ezvpn-apple
        uses: actions/checkout@v7
        with:
          path: ezvpn-apple

      - name: Check out ezvpn (pinned) as sibling
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.ezvpn_repo }}
          ref: ${{ inputs.ezvpn_ref }}
          path: ezvpn
          # ezvpn is public today, so the default token works. If it becomes
          # private, add a repo secret EZVPN_CHECKOUT_TOKEN (a PAT/fine-grained
          # token with read access to ezvpn) and it will be used automatically.
          token: ${{ secrets.EZVPN_CHECKOUT_TOKEN || github.token }}

      - name: Show build environment
        run: |
          uname -m
          xcodebuild -version
          swift --version
          rustc --version
          cargo --version
          echo "ezvpn @ $(git -C ezvpn rev-parse HEAD)"

      - name: Install XcodeGen
        run: brew install xcodegen

      # Produces ezvpn/dist/apple/libezvpn.xcframework, which the committed
      # symlink resolves to. Must run before project generation / build so SPM
      # finds the binary target.
      - name: Build libezvpn.xcframework from pinned ezvpn
        working-directory: ezvpn
        run: ./build-apple.sh

      - name: Test TunnelCore
        working-directory: ezvpn-apple/Packages/TunnelCore
        run: swift test

      - name: Generate Xcode project
        working-directory: ezvpn-apple
        run: xcodegen generate

      - name: Test app models on macOS (against pinned core)
        working-directory: ezvpn-apple
        run: |
          xcodebuild test \
            -project Ezvpn.xcodeproj \
            -scheme Ezvpn \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-Tests" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Build macOS app + system extension (compile/link check)
        working-directory: ezvpn-apple
        run: |
          xcodebuild build \
            -project Ezvpn.xcodeproj \
            -scheme Ezvpn \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -sdk macosx \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-macOS" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Build iOS app + PacketTunnel extension (compile/link check)
        working-directory: ezvpn-apple
        run: |
          xcodebuild build \
            -project Ezvpn.xcodeproj \
            -scheme Ezvpn \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-iOS" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: verify-ezvpn-commit-test-results
          path: ${{ runner.temp }}/TestResults.xcresult
          if-no-files-found: warn
